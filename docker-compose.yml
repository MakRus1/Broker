# PostgreSQL для локального запуска сервиса (тесты поднимают БД сами через testsuite).
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: testsuite
      POSTGRES_PASSWORD: testsuite
      POSTGRES_DB: broker_db_1
    ports:
      - "15433:5432"
    volumes:
      - ./services/broker/postgresql/schemas/db_1.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testsuite -d broker_db_1"]
      interval: 2s
      timeout: 5s
      retries: 10
